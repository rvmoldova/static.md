<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="description" content="Free image hosting — upload, share, embed">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Static MD</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
  <link rel="manifest" href="/manifest.json">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#267cdb">
  <meta name="theme-color" content="#267cdb">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <script>
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')})();
  </script>
  <noscript>
    <style>
      body { font-family: monospace; padding: 2rem; }
      .noscript-msg { max-width: 600px; margin: 4rem auto; text-align: center; }
    </style>
  </noscript>
</head>
<body>
  <noscript>
    <div class="noscript-msg">
      <h1>Please enable JavaScript</h1>
      <p>Static.md requires JavaScript to work. Please enable it and refresh the page.</p>
    </div>
  </noscript>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
